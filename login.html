<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · ECE Workshops</title>

  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="mono">

  <nav class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="brand"><img src="assets/logo.png" class="brand-logo" alt="ECE Workshops" /> ECE Workshops</a>
      <div class="nav-links">
        <a href="index.html#about">About</a>
        <a href="index.html#schedule">Schedule</a>
      </div>
      <div class="nav-right">
        <button id="themeBtn" class="theme-btn" type="button" aria-label="Toggle theme">
          <svg class="tic sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
          </svg>
          <svg class="tic moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
          </svg>
        </button>
        <a class="nav-back" href="index.html">Home</a>
      </div>
    </div>
  </nav>

  <main class="auth-wrap">
    <div class="auth-card">
      <h1>Welcome back :)</h1>
      <p class="sub">Log in to get to your workshop dashboard.</p>

      <!-- accounts removed for now, login goes straight in -->
      <form id="loginForm">
        <div class="field">
          <label for="liEmail">Email</label>
          <input id="liEmail" type="email" autocomplete="email" placeholder="you@mail.utoronto.ca" />
        </div>
        <div class="field">
          <label for="liPass">Password</label>
          <input id="liPass" type="password" autocomplete="current-password" placeholder="••••••" />
        </div>
        <button class="btn btn-primary" type="submit">Log in</button>
        <p class="form-msg" id="loginMsg"></p>
      </form>

      <p class="auth-switch">Don't have an account? <a href="#" onclick="return false;">Sign up</a></p>
    </div>

    <p class="auth-legal"><a href="#">Privacy Policy</a> · <a href="#">Terms of Service</a></p>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
