<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounts · ECE Workshops</title>

  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="mono">

  <nav class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="brand"><img src="assets/logo.png" class="brand-logo" alt="ECE Workshops" /> ECE Workshops</a>
      <div class="nav-links">
        <a href="#students">Students</a>
        <a href="#tas">Staff</a>
      </div>
      <div class="nav-right">
        <a class="btn btn-ghost" href="instructor.html">Content manager</a>
        <button id="themeBtn" class="theme-btn" type="button" aria-label="Toggle theme">
          <svg class="tic sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
          </svg>
          <svg class="tic moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
          </svg>
          <span class="tic-label"></span>
        </button>
        <button class="btn btn-ghost" id="logoutBtn" type="button">Log out</button>
      </div>
    </div>
  </nav>

  <!-- shown if you're not logged in with a ta key -->
  <div class="gate" id="accGate" style="display:none">
    <h2>Staff only</h2>
    <p class="muted">Log in with a staff key to manage accounts.</p>
    <a class="btn btn-primary" href="login.html">Go to login</a>
  </div>

  <main id="accApp" style="display:none">
    <section class="dash-head">
      <div class="wrap">
        <p class="eyebrow">Staff portal</p>
        <h1>Accounts</h1>
      </div>
    </section>

    <section class="section-sm" id="students">
      <div class="wrap">
        <h2 style="font-size:1.4rem;margin-bottom:18px">Students</h2>
        <div class="res-list" id="studentList">
          <!-- filled in by accounts.js -->
        </div>
        <div class="ta-card" style="margin-top:14px">
          <div class="ta-row">
            <div class="field"><label for="stuUser">Username</label>
              <input type="text" id="stuUser" autocomplete="off"></div>
            <div class="field"><label for="stuPass">Password</label>
              <input type="text" id="stuPass" autocomplete="off"></div>
            <div class="field"><label>&nbsp;</label>
              <button class="btn btn-primary" id="stuAdd" type="button">Add student</button></div>
          </div>
        </div>
      </div>
    </section>

    <section class="section-sm" id="tas" style="background:var(--bg-2)">
      <div class="wrap">
        <h2 style="font-size:1.4rem;margin-bottom:18px">Staff</h2>
        <div class="res-list" id="taList">
          <!-- filled in by accounts.js -->
        </div>
        <div class="ta-card" style="margin-top:14px">
          <div class="ta-row">
            <div class="field"><label for="taUser">Username</label>
              <input type="text" id="taUser" autocomplete="off"></div>
            <div class="field"><label for="taPass">Password</label>
              <input type="text" id="taPass" autocomplete="off"></div>
            <div class="field"><label>&nbsp;</label>
              <button class="btn btn-primary" id="taAdd" type="button">Add staff</button></div>
          </div>
        </div>
        <p class="form-msg" id="accMsg"></p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap">ECE Workshops · Staff area</div>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/idle.js"></script>
  <script src="js/accounts.js"></script>
</body>
</html>
