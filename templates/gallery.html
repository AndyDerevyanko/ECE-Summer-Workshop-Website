<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery · ECE Workshops</title>
  <meta name="description"
    content="Photos from the 2026 UofT ECE Workshops." />

  <!-- set the saved theme before paint so there's no flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      } catch (e) { }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body class="mono">

  <!-- ===== nav ===== -->
  <nav class="nav">
    <div class="wrap nav-inner">
      <a href="index.html" class="brand"><img src="assets/logo.png" class="brand-logo"
          alt="ECE Workshops" /> ECE Workshops</a>
      <div class="nav-links">
        <a href="index.html#about">About</a>
        <a href="index.html#schedule">Schedule</a>
        <a href="index.html#prizes">Prizes</a>
      </div>
      <div class="nav-right">
        <button id="themeBtn" class="theme-btn" type="button" aria-label="Toggle theme">
          <svg class="tic sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
          </svg>
          <svg class="tic moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
          </svg>
          <span class="tic-label"></span>
        </button>
        <a class="nav-back" href="index.html">Home</a>
      </div>
    </div>
  </nav>

  <!-- ===== gallery viewer ===== -->
  <section class="section-sm">
    <div class="wrap">
      <p class="eyebrow" id="gvYear">2026</p>
      <h1 style="font-size:1.9rem;margin-bottom:24px">Gallery</h1>

      <div class="gv">
        <!-- year rail, filled in by gallery.js from the ta-saved years -->
        <div class="gv-years" id="gvYears" role="group" aria-label="Pick a year"></div>

        <!-- one photo at a time, arrows to move -->
        <div class="gv-stage">
          <button class="gv-arrow gv-prev" id="gvPrev" type="button" aria-label="Previous photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 5l-7 7 7 7" />
            </svg>
          </button>
          <img id="gvImg" class="gv-img" alt="Workshop photo" />
          <video id="gvVid" class="gv-img" autoplay muted loop playsinline hidden></video>
          <button class="gv-arrow gv-next" id="gvNext" type="button" aria-label="Next photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 5l7 7-7 7" />
            </svg>
          </button>
          <span class="gv-count" id="gvCount">1 / 1</span>
        </div>
      </div>

      <p class="gv-hint muted">Click the photo or use the arrow keys to flip through.</p>
    </div>
  </section>

  <!-- ===== footer ===== -->
  <footer class="footer">
    <div class="wrap foot-grid">
      <div>
        <div class="brand" style="margin-bottom:6px"><img src="assets/logo.png" class="brand-logo"
            alt="ECE Workshops" /> ECE Workshops</div>
        <div>University of Toronto ECE</div>
      </div>
      <div>
        <div>Questions? hardware.robotics@utoronto.ca</div>
      </div>
    </div>
  </footer>

  <script src="js/theme.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
